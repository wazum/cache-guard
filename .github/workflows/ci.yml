name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / TYPO3 ${{ matrix.typo3 }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        typo3: ['^12.4', '^13.4', '~14.3.0']
        exclude:
          - php: '8.4'
            typo3: '^12.4'
          - php: '8.5'
            typo3: '^12.4'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Pin TYPO3 version
        run: |
          composer require typo3/cms-core:"${{ matrix.typo3 }}" typo3/cms-backend:"${{ matrix.typo3 }}" --no-update
          composer require typo3/cms-install:"${{ matrix.typo3 }}" --dev --no-update
      - run: composer update --no-interaction --no-progress
      - run: composer cs:check
      - run: composer phpstan
      - run: composer test:unit
      - run: composer test:functional
